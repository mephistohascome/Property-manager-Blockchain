services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance_dev
      POSTGRES_DB: cloud_compliance
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d cloud_compliance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
